extend type Query {
    me : User @auth @guard
}

extend type Mutation {
    updateMe(input: UpdateMe! @spread) : User! @update @guard @inject(context: "user.id", name: "id")
    setPrimaryRole(roleId: ID!): User! @guard @field(resolver: "\\App\\GraphQL\\Mutations\\SetPrimaryRole@resolve")
}

input UpsertSubscriptionSettingBelongTo {
    upsert: UpsertSubscriptionSettingInput
}

input UpsertSubscriptionSettingInput {
    id: ID
    email: Boolean!
}

input UpdateMe {
    name: String
    email: String
    player_id: String @rules(apply: ["nullable", "string", "App\\Rules\\UniquePlayerId"])
    subscriptionSettings: UpsertSubscriptionSettingBelongTo
    clubs: ConnectClubs
}

input ConnectClubs {
    connect: [ID!]
    disconnect: [ID!]
}

type User {
    id: ID!
    name: String!
    email: String!
    player_id: String
    subscriptionSettings: SubscriptionSetting
    cancellationCollector: CancellationCollector
    "Roles"
    roles: [Role!]!
    "Selected primary clubhouse"
    clubhouse: Clubhouse
    "Clubhouse membership"
    clubhouses: [Clubhouse!]!
    "Linked OAuth providers (Google, etc.)"
    socialProviders: [SocialProvider!]! @hasMany
    created_at: DateTime!
    updated_at: DateTime!
    primaryRole: Role
}

type Role {
    id: ID!
    name: String!
}

type SubscriptionSetting {
    id: ID!
    email: Boolean!
}

type SocialProvider {
    id: ID!
    "OAuth provider name (e.g. 'google')"
    provider: String!
    "When the link was created"
    created_at: DateTime!
}
