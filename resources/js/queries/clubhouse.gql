query clubhouse($id: ID!){
    clubhouse(id: $id){
        id
        name
        email
        clubs {
            id
            name1
            initialized
        }
        users {
            id
            name
            email
            player_id
            clubhouse {
                id
            }
            roles {
                id
                name
            }
            member {
                id
                name
            }
        }
        invitations {
            id
            status
            role
            url
            inviteeEmail
            expiresAt
            acceptedAt
            createdAt
        }
    }
}
